<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Movement — Complex Path</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }
    #gameCanvas {
      border: 2px solid #c084fc;
      border-radius: 4px;
      image-rendering: pixelated;
    }
    #controls {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #555;
    }
    #controls strong { color: #c084fc; }
    #backBtn {
      margin-top: 10px;
      padding: 8px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #backBtn:hover {
      border-color: #c084fc;
      color: #c084fc;
      background: rgba(192,132,252,0.08);
    }
    #controls-bar {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    #controls-bar button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.15s;
    }
    #controls-bar button:hover {
      border-color: #c084fc;
      color: #c084fc;
      background: rgba(192,132,252,0.08);
    }
    #modeLabel { color: #c084fc; }
  </style>
</head>
<body>
  <div id="controls-bar">
    <button id="btnPlay">▶ Play</button>
    <button id="btnStep">⏭ Step</button>
    <button id="btnReset">⏮ Reset</button>
    <span id="modeLabel">Mode: Auto</span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="controls">
    <strong>1</strong>: Respawn Mouse &nbsp;|&nbsp;
    <strong>ESC</strong>: Back to Menu
  </div>
  <button id="backBtn" onclick="window.location.href='../'">← Back to Main Menu</button>
  <script>
    // ─── Constants ───────────────────────────────────────────────────
    const kMaxPathLength = 8;
    const TILE_SIZE = 32;
    const CANVAS_W = 1024;
    const CANVAS_H = 768;
    const BG_COLOR = '#4682B4';
    const STEP_INTERVAL = 30;

    // ─── Canvas ──────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    const ctx = canvas.getContext('2d');

    // ─── State ───────────────────────────────────────────────────────
    let catPosition = { x: 0, y: 0 };
    let mousePosition = { x: 0, y: 0 };
    let pathRow = new Array(kMaxPathLength).fill(-1);
    let pathCol = new Array(kMaxPathLength).fill(-1);
    let currentStep = 0;
    let counter = 0;
    let stop = false;
    let oldKeys = {};
    let frameCount = 0;

    // ─── Step Mode State ─────────────────────────────────────────────
    let autoPlay = true;
    let stepRequested = false;

    // ─── Instruction Descriptions ────────────────────────────────────
    function getSegmentLabel(i) {
      const names = [
        ["(4,2) → (4,11)", "Δ(0,+9)"],
        ["(4,11) → (2,24)", "Δ(-2,+13)"],
        ["(2,24) → (13,27)", "Δ(+11,+3)"],
        ["(13,27) → (16,24)", "Δ(+3,-3)"],
        ["(16,24) → (13,17)", "Δ(-3,-7)"],
        ["(13,17) → (13,13)", "Δ(0,-4)"],
        ["(13,13) → (17,5)", "Δ(+4,-8)"],
        ["(17,5) → (4,2)", "Δ(-13,-3)"]
      ];
      return names[i] || ["Seg " + i, ""];
    }

    // ─── Sprites ─────────────────────────────────────────────────
    function drawCat(px, py) {
      ctx.save();
      ctx.fillStyle = '#FFA500';
      ctx.fillRect(px + 2, py + 4, 28, 24);
      ctx.fillStyle = '#FFB830';
      ctx.fillRect(px + 6, py, 20, 16);
      ctx.fillStyle = '#FF8C00';
      ctx.beginPath();
      ctx.moveTo(px + 6, py); ctx.lineTo(px + 10, py - 8); ctx.lineTo(px + 14, py); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(px + 18, py); ctx.lineTo(px + 22, py - 8); ctx.lineTo(px + 26, py); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 10, py + 4, 4, 4);
      ctx.fillRect(px + 18, py + 4, 4, 4);
      ctx.strokeStyle = '#FF8C00';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(px + 2, py + 16);
      ctx.quadraticCurveTo(px - 6, py + 8, px - 2, py + 24);
      ctx.stroke();
      ctx.restore();
    }

    function drawMouse(px, py) {
      ctx.save();
      ctx.fillStyle = '#A9A9A9';
      ctx.beginPath();
      ctx.ellipse(px + 16, py + 20, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#B0B0B0';
      ctx.beginPath();
      ctx.arc(px + 16, py + 8, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(px + 8, py + 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 24, py + 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 12, py + 6, 3, 3);
      ctx.fillRect(px + 19, py + 6, 3, 3);
      ctx.fillStyle = '#FF69B4';
      ctx.fillRect(px + 14, py + 10, 4, 3);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 28);
      ctx.quadraticCurveTo(px + 16, py + 36, px + 24, py + 34);
      ctx.stroke();
      ctx.restore();
    }

    // ─── Background texture ─────────────────────────────────────
    function drawBackground() {
      ctx.save();
      ctx.translate(40, 40);
      ctx.scale(1.45, 1.45);
      ctx.fillStyle = '#2a4a6b';
      ctx.fillRect(0, 0, 640, 640);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= 20; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * 32); ctx.lineTo(640, r * 32); ctx.stroke();
      }
      for (let c = 0; c <= 20; c++) {
        ctx.beginPath(); ctx.moveTo(c * 32, 0); ctx.lineTo(c * 32, 640); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= 20; r += 5) {
        ctx.beginPath(); ctx.moveTo(0, r * 32); ctx.lineTo(640, r * 32); ctx.stroke();
      }
      for (let c = 0; c <= 20; c += 5) {
        ctx.beginPath(); ctx.moveTo(c * 32, 0); ctx.lineTo(c * 32, 640); ctx.stroke();
      }
      ctx.restore();
    }

    // ─── Path Logic ──────────────────────────────────────────────────
    function buildPathSegment(startRow, startCol, endRow, endCol, index) {
      if (index === 0) {
        pathCol[index] = startCol;
        pathRow[index] = startRow;
        pathCol[index + 1] = endCol - startCol;
        pathRow[index + 1] = endRow - startRow;
      } else if (index < pathCol.length - 1) {
        pathCol[index + 1] = endCol - startCol;
        pathRow[index + 1] = endRow - startRow;
      }
    }

    function doPatternMovementTiledNormalization() {
      let endCol, endRow;
      let sumCol = 0, sumRow = 0;

      if (currentStep === pathCol.length - 1) {
        endCol = pathCol[0];
        endRow = pathRow[0];
      } else {
        for (let i = 0; i <= currentStep; i++) {
          sumCol += pathCol[i];
          sumRow += pathRow[i];
        }
        endCol = sumCol + pathCol[currentStep + 1];
        endRow = sumRow + pathRow[currentStep + 1];
      }

      let nextCol = catPosition.x;
      let nextRow = catPosition.y;
      let deltaRow = endRow - catPosition.y;
      let deltaCol = endCol - catPosition.x;
      let stepCol = 1, stepRow = 1;
      let fraction;

      if (deltaRow < 0) stepRow = -1; else stepRow = 1;
      if (deltaCol < 0) stepCol = -1; else stepCol = 1;

      deltaRow = Math.abs(deltaRow);
      deltaCol = Math.abs(deltaCol);

      if (deltaCol > deltaRow) {
        fraction = deltaRow * 2 - deltaCol;
        if (fraction >= 0 && nextCol !== endCol) {
          nextRow = nextRow + stepRow;
        }
        nextCol = nextCol + stepCol;
        catPosition.x = nextCol;
        catPosition.y = nextRow;
      } else {
        fraction = deltaCol * 2 - deltaRow;
        if (fraction >= 0 && nextRow !== endRow) {
          nextCol = nextCol + stepCol;
        }
        nextRow = nextRow + stepRow;
        catPosition.x = nextCol;
        catPosition.y = nextRow;
      }

      if (catPosition.x === endCol && catPosition.y === endRow) {
        currentStep++;
        if (currentStep >= kMaxPathLength) {
          currentStep = 0;
        }
      }
    }

    // ─── Initialization ──────────────────────────────────────────────
    function init() {
      catPosition.x = Math.floor(Math.random() * 10);
      catPosition.y = Math.floor(Math.random() * 10);
      mousePosition.x = Math.floor(Math.random() * 10);
      mousePosition.y = Math.floor(Math.random() * 10);

      buildPathSegment(4, 2, 4, 11, 0);
      buildPathSegment(4, 11, 2, 24, 1);
      buildPathSegment(2, 24, 13, 27, 2);
      buildPathSegment(13, 27, 16, 24, 3);
      buildPathSegment(16, 24, 13, 17, 4);
      buildPathSegment(13, 17, 13, 13, 5);
      buildPathSegment(13, 13, 17, 5, 6);
      buildPathSegment(17, 5, 4, 2, 7);

      catPosition.x = pathCol[0];
      catPosition.y = pathRow[0];
      currentStep = 0;
      stop = false;
    }

    // ─── Reset ───────────────────────────────────────────────────────
    function resetGame() {
      init();
      autoPlay = true;
      stepRequested = false;
      document.getElementById('modeLabel').textContent = 'Mode: Auto';
      document.getElementById('btnPlay').textContent = '▶ Play';
      frameCount = 0;
    }

    // ─── Input ───────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.location.href = '../';
        return;
      }
      if (e.key === '1' && !oldKeys['1']) {
        mousePosition.x = Math.floor(Math.random() * 10);
        mousePosition.y = Math.floor(Math.random() * 10);
        stop = false;
      }
      oldKeys[e.key] = true;
    });

    document.addEventListener('keyup', (e) => {
      oldKeys[e.key] = false;
    });

    // ─── Step Mode Controls ──────────────────────────────────────────
    document.getElementById('btnPlay').addEventListener('click', () => {
      autoPlay = !autoPlay;
      document.getElementById('btnPlay').textContent = autoPlay ? '▶ Play' : '⏸ Pause';
      document.getElementById('modeLabel').textContent = autoPlay ? 'Mode: Auto' : 'Mode: Step';
    });
    document.getElementById('btnStep').addEventListener('click', () => {
      if (!autoPlay) {
        doPatternMovementTiledNormalization();
      }
    });
    document.getElementById('btnReset').addEventListener('click', resetGame);

    // ─── Update ──────────────────────────────────────────────────────
    function update() {
      if (frameCount % STEP_INTERVAL === 0 && !stop && autoPlay) {
        doPatternMovementTiledNormalization();
      }
      frameCount++;
      if (frameCount > 59) frameCount = 0;
    }

    // ─── Draw ────────────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = BG_COLOR;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      drawBackground();

      drawCat(catPosition.x * TILE_SIZE, catPosition.y * TILE_SIZE);
      drawMouse(mousePosition.x * TILE_SIZE, mousePosition.y * TILE_SIZE);

      // ─── Instruction Queue HUD ─────────────────────────────────
      const panelX = 690;
      const panelY = 60;
      const panelW = 310;
      const panelH = 420;

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(192,132,252,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 10);
      ctx.stroke();

      // Title
      ctx.fillStyle = '#c084fc';
      ctx.font = 'bold 15px "Courier New", monospace';
      ctx.fillText('🧠 AI Brain', panelX + 14, panelY + 22);

      // Subtitle
      ctx.fillStyle = '#888';
      ctx.font = '10px "Courier New", monospace';
      ctx.fillText('8-Segment Complex Path', panelX + 14, panelY + 36);

      // Queue rows
      for (let i = 0; i < kMaxPathLength; i++) {
        const rowY = panelY + 56 + i * 42;
        const [label, deltaStr] = getSegmentLabel(i);
        let statusIcon, statusColor;
        if (i < currentStep) {
          statusIcon = '✅';
          statusColor = '#4ade80';
        } else if (i === currentStep) {
          statusIcon = '▶';
          statusColor = '#c084fc';
        } else {
          statusIcon = '⏳';
          statusColor = '#555';
        }

        if (i === currentStep) {
          ctx.fillStyle = 'rgba(192,132,252,0.12)';
          ctx.beginPath();
          ctx.roundRect(panelX + 8, rowY - 4, panelW - 16, 36, 5);
          ctx.fill();
        }

        ctx.fillStyle = statusColor;
        ctx.font = '14px "Courier New", monospace';
        ctx.fillText(statusIcon, panelX + 12, rowY + 14);

        ctx.font = '11px "Courier New", monospace';
        ctx.fillStyle = statusColor;
        ctx.fillText(label, panelX + 34, rowY + 14);

        ctx.fillStyle = i <= currentStep ? '#999' : '#444';
        ctx.font = '10px "Courier New", monospace';
        ctx.fillText(deltaStr, panelX + 34, rowY + 28);
      }

      // Bottom stats
      const statsY = panelY + panelH - 40;
      ctx.fillStyle = '#ccc';
      ctx.font = '12px "Courier New", monospace';
      ctx.fillText('Progress: ' + currentStep + '/' + kMaxPathLength, panelX + 14, statsY);
      ctx.fillStyle = autoPlay ? '#4ade80' : '#ffd93d';
      ctx.fillText('Mode: ' + (autoPlay ? 'Auto' : 'Step'), panelX + 14, statsY + 16);

      ctx.restore();

      // HUD text
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('Cat pos X,y ' + catPosition.x + ',' + catPosition.y, 620, 30);
      ctx.fillText('Mouse pos X,y ' + mousePosition.x + ',' + mousePosition.y, 620, 50);
      ctx.fillStyle = '#c084fc';
      ctx.fillText('Step: ' + currentStep + '/' + (kMaxPathLength - 1) + '  Frame: ' + frameCount, 620, 70);
      ctx.restore();
    }

    // ─── Game Loop ───────────────────────────────────────────────────
    init();

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
