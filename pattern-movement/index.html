<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Movement — Tiled Environment (Pat Matrix)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }
    #gameCanvas {
      border: 2px solid #e94560;
      border-radius: 4px;
      image-rendering: pixelated;
    }
    #controls {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #555;
    }
    #controls strong { color: #e94560; }
    #backBtn {
      margin-top: 10px;
      padding: 8px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #backBtn:hover {
      border-color: #e94560;
      color: #e94560;
      background: rgba(233,69,96,0.08);
    }
    #controls-bar {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    #controls-bar button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.15s;
    }
    #controls-bar button:hover {
      border-color: #e94560;
      color: #e94560;
      background: rgba(233,69,96,0.08);
    }
    #modeLabel { color: #e94560; }
  </style>
</head>
<body>
  <div id="controls-bar">
    <button id="btnPlay">▶ Play</button>
    <button id="btnStep">⏭ Step</button>
    <button id="btnReset">⏮ Reset</button>
    <span id="modeLabel">Mode: Auto</span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="controls">
    <strong>1</strong>: Respawn Mouse &nbsp;|&nbsp;
    <strong>2</strong>: Toggle 4/8 Dir &nbsp;|&nbsp;
    <strong>ESC</strong>: Back to Menu
  </div>
  <button id="backBtn" onclick="window.location.href='../'">← Back to Main Menu</button>
  <script>
    // ─── Constants ───────────────────────────────────────────────────
    const kMaxRows = 20;
    const kMaxCols = 20;
    const kMaxPathLength = 7;
    const TILE_SIZE = 32;
    const GRID_PX = kMaxCols * TILE_SIZE; // 640
    const CANVAS_W = 1024;
    const CANVAS_H = 768;
    const BG_COLOR = '#4682B4';
    const STEP_INTERVAL = 30;

    // ─── State ───────────────────────────────────────────────────────
    let catPosition = { x: 0, y: 0 };
    let mousePosition = { x: 0, y: 0 };
    let pathRow = new Array(kMaxPathLength).fill(-1);
    let pathCol = new Array(kMaxPathLength).fill(-1);
    let pattern = [];
    let markedpattern = [];
    let currentStep = 0;
    let counter = 0;
    let stop = false;
    let patternIndexCol = 0;
    let patternIndexRow = 0;
    let patterStop = false;
    let previousRow = 0;
    let previousCol = 0;
    let oldKeys = {};
    let frameCount = 0;
    let use4Dir = false;

    // ─── Step Mode State ─────────────────────────────────────────────
    let autoPlay = true;
    let stepRequested = false;

    // ─── Canvas ──────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    const ctx = canvas.getContext('2d');

    // ─── Instruction Descriptions ────────────────────────────────────
    function getSegmentLabel(i) {
      const names = [
        ["Seg 0: (3,2)→(16,2)", "Δ(0,+13)"],
        ["Seg 1: (16,2)→(16,11)", "Δ(+9,0)"],
        ["Seg 2: (16,11)→(9,11)", "Δ(0,-7)"],
        ["Seg 3: (9,11)→(9,2)", "Δ(-9,0)"],
        ["Seg 4: (9,2)→(9,6)", "Δ(+4,0)"],
        ["Seg 5: (9,6)→(3,6)", "Δ(0,-6)"],
        ["Seg 6: (3,6)→(3,2)", "Δ(-4,0)"]
      ];
      return names[i] || ["Seg " + i, ""];
    }

    // ─── Sprites ─────────────────────────────────────────────────
    function drawCat(px, py) {
      ctx.save();
      ctx.fillStyle = '#FFA500';
      ctx.fillRect(px + 2, py + 4, 28, 24);
      ctx.fillStyle = '#FFB830';
      ctx.fillRect(px + 6, py, 20, 16);
      ctx.fillStyle = '#FF8C00';
      ctx.beginPath();
      ctx.moveTo(px + 6, py); ctx.lineTo(px + 10, py - 8); ctx.lineTo(px + 14, py); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(px + 18, py); ctx.lineTo(px + 22, py - 8); ctx.lineTo(px + 26, py); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 10, py + 4, 4, 4);
      ctx.fillRect(px + 18, py + 4, 4, 4);
      ctx.strokeStyle = '#FF8C00';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(px + 2, py + 16);
      ctx.quadraticCurveTo(px - 6, py + 8, px - 2, py + 24);
      ctx.stroke();
      ctx.restore();
    }

    function drawMouse(px, py) {
      ctx.save();
      ctx.fillStyle = '#A9A9A9';
      ctx.beginPath();
      ctx.ellipse(px + 16, py + 20, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#B0B0B0';
      ctx.beginPath();
      ctx.arc(px + 16, py + 8, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(px + 8, py + 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 24, py + 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 12, py + 6, 3, 3);
      ctx.fillRect(px + 19, py + 6, 3, 3);
      ctx.fillStyle = '#FF69B4';
      ctx.fillRect(px + 14, py + 10, 4, 3);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 28);
      ctx.quadraticCurveTo(px + 16, py + 36, px + 24, py + 34);
      ctx.stroke();
      ctx.restore();
    }

    function drawTile(px, py) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      ctx.strokeStyle = 'rgba(200,200,200,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 0.5, py + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
      ctx.restore();
    }

    // ─── Pattern / Path Logic ────────────────────────────────────────
    function buildPatternSegment(startRow, startCol, endRow, endCol, index) {
      if (index === 0) {
        pathCol[index] = startCol;
        pathRow[index] = startRow;
        pathCol[index + 1] = endCol - startCol;
        pathRow[index + 1] = endRow - startRow;
      } else if (index < pathCol.length - 1) {
        pathCol[index + 1] = endCol - startCol;
        pathRow[index + 1] = endRow - startRow;
      }
    }

    function doPatternSegment() {
      let endCol, endRow;
      let sumCol = 0, sumRow = 0;

      if (currentStep === pathCol.length - 1) {
        endCol = pathCol[0];
        endRow = pathRow[0];
      } else {
        for (let i = 0; i <= currentStep; i++) {
          sumCol += pathCol[i];
          sumRow += pathRow[i];
        }
        endCol = sumCol + pathCol[currentStep + 1];
        endRow = sumRow + pathRow[currentStep + 1];
      }

      let nextCol = patternIndexCol;
      let nextRow = patternIndexRow;
      let deltaRow = endRow - patternIndexRow;
      let deltaCol = endCol - patternIndexCol;
      let stepCol = 1, stepRow = 1;
      let fraction;

      if (deltaRow < 0) stepRow = -1; else stepRow = 1;
      if (deltaCol < 0) stepCol = -1; else stepCol = 1;

      deltaRow = Math.abs(deltaRow);
      deltaCol = Math.abs(deltaCol);

      if (deltaCol > deltaRow) {
        fraction = deltaRow * 2 - deltaCol;
        if (fraction >= 0 && nextCol !== endCol) {
          nextRow = nextRow + stepRow;
        }
        nextCol = nextCol + stepCol;
        patternIndexCol = nextCol;
        patternIndexRow = nextRow;
        pattern[Math.round(patternIndexRow)][Math.round(patternIndexCol)] = 1;
      } else {
        fraction = deltaCol * 2 - deltaRow;
        if (fraction >= 0 && nextRow !== endRow) {
          nextCol = nextCol + stepCol;
        }
        nextRow = nextRow + stepRow;
        patternIndexCol = nextCol;
        patternIndexRow = nextRow;
        pattern[Math.round(patternIndexRow)][Math.round(patternIndexCol)] = 1;
      }

      if (patternIndexCol === endCol && patternIndexRow === endRow) {
        currentStep++;
        if (currentStep >= kMaxPathLength) {
          currentStep = 0;
          patterStop = true;
        }
      }
    }

    function followPattern() {
      const row = Math.round(catPosition.y);
      const col = Math.round(catPosition.x);

      let possibleRowPath, possibleColPath, rowOffset, colOffset;
      if (use4Dir) {
        possibleRowPath = [0, 0, 0, 0];
        possibleColPath = [0, 0, 0, 0];
        rowOffset = [-1, 0, 0, 1];
        colOffset = [0, -1, 1, 0];
      } else {
        possibleRowPath = [0, 0, 0, 0, 0, 0, 0, 0];
        possibleColPath = [0, 0, 0, 0, 0, 0, 0, 0];
        rowOffset = [-1, -1, -1, 0, 0, 1, 1, 1];
        colOffset = [-1, 0, 1, -1, 1, -1, 0, 1];
      }
      const totalDirection = rowOffset.length;

      let j = 0;
      for (let i = 0; i < totalDirection; i++) {
        const nr = row + rowOffset[i];
        const nc = col + colOffset[i];
        if (nr >= 0 && nr < kMaxRows && nc >= 0 && nc < kMaxCols) {
          if (pattern[nr][nc] === 1) {
            if (!(nr === previousRow && nc === previousCol)) {
              possibleRowPath[j] = nr;
              possibleColPath[j] = nc;
              j++;
            }
          }
        }
      }

      if (j === 0) return;

      let randstep;
      let newRow, newCol;
      do {
        randstep = Math.floor(Math.random() * 1000000000) % j;
        previousRow = row;
        previousCol = col;
        newRow = possibleRowPath[randstep];
        newCol = possibleColPath[randstep];
      } while (previousRow === newRow && previousCol === newCol);

      catPosition.x = newCol;
      catPosition.y = newRow;
    }

    // ─── Initialization ──────────────────────────────────────────────
    function init() {
      pattern = [];
      for (let r = 0; r < kMaxRows; r++) {
        pattern[r] = new Array(kMaxCols).fill(0);
      }
      markedpattern = [];
      for (let r = 0; r < kMaxRows; r++) {
        markedpattern[r] = new Array(kMaxCols).fill(0);
      }

      catPosition.x = Math.floor(Math.random() * 10);
      catPosition.y = Math.floor(Math.random() * 10);
      mousePosition.x = Math.floor(Math.random() * 10);
      mousePosition.y = Math.floor(Math.random() * 10);

      buildPatternSegment(3, 2, 16, 2, 0);
      buildPatternSegment(16, 2, 16, 11, 1);
      buildPatternSegment(16, 11, 9, 11, 2);
      buildPatternSegment(9, 11, 9, 2, 3);
      buildPatternSegment(9, 2, 9, 6, 4);
      buildPatternSegment(9, 6, 3, 6, 5);
      buildPatternSegment(3, 6, 3, 2, 6);

      catPosition.x = pathCol[0];
      catPosition.y = pathRow[0];

      for (let r = 0; r < kMaxRows; r++)
        for (let c = 0; c < kMaxCols; c++)
          pattern[r][c] = 0;

      pattern[Math.round(pathRow[0])][Math.round(pathCol[0])] = 1;
      patternIndexCol = pathCol[0];
      patternIndexRow = pathRow[0];
      currentStep = 0;
      patterStop = false;

      while (!patterStop) {
        doPatternSegment();
      }
    }

    // ─── Reset ───────────────────────────────────────────────────────
    function resetGame() {
      init();
      autoPlay = true;
      stepRequested = false;
      document.getElementById('modeLabel').textContent = 'Mode: Auto';
      document.getElementById('btnPlay').textContent = '▶ Play';
      frameCount = 0;
    }

    // ─── Input ───────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.location.href = '../';
        return;
      }
      if (e.key === '1' && !oldKeys['1']) {
        mousePosition.x = Math.floor(Math.random() * 10);
        mousePosition.y = Math.floor(Math.random() * 10);
        stop = false;
      }
      if (e.key === '2' && !oldKeys['2']) {
        use4Dir = !use4Dir;
      }
      oldKeys[e.key] = true;
    });

    document.addEventListener('keyup', (e) => {
      oldKeys[e.key] = false;
    });

    // ─── Step Mode Controls ──────────────────────────────────────────
    document.getElementById('btnPlay').addEventListener('click', () => {
      autoPlay = !autoPlay;
      document.getElementById('btnPlay').textContent = autoPlay ? '▶ Play' : '⏸ Pause';
      document.getElementById('modeLabel').textContent = autoPlay ? 'Mode: Auto' : 'Mode: Step';
    });
    document.getElementById('btnStep').addEventListener('click', () => {
      if (!autoPlay) {
        followPattern();
      }
    });
    document.getElementById('btnReset').addEventListener('click', resetGame);

    // ─── Update ──────────────────────────────────────────────────────
    function update() {
      if (frameCount % STEP_INTERVAL === 0 && !stop && autoPlay) {
        followPattern();
      }
      frameCount++;
      if (frameCount > 59) frameCount = 0;
    }

    // ─── Draw ────────────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = BG_COLOR;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= kMaxRows; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * TILE_SIZE);
        ctx.lineTo(GRID_PX, r * TILE_SIZE);
        ctx.stroke();
      }
      for (let c = 0; c <= kMaxCols; c++) {
        ctx.beginPath();
        ctx.moveTo(c * TILE_SIZE, 0);
        ctx.lineTo(c * TILE_SIZE, GRID_PX);
        ctx.stroke();
      }

      // Draw pattern tiles
      for (let c = 0; c < kMaxCols; c++) {
        for (let r = 0; r < kMaxRows; r++) {
          if (pattern[r][c] === 1) {
            drawTile(c * TILE_SIZE, r * TILE_SIZE);
          }
        }
      }

      drawCat(catPosition.x * TILE_SIZE, catPosition.y * TILE_SIZE);
      drawMouse(mousePosition.x * TILE_SIZE, mousePosition.y * TILE_SIZE);

      // ─── Instruction Queue HUD ─────────────────────────────────
      const panelX = 700;
      const panelY = 60;
      const panelW = 300;
      const panelH = 380;

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(233,69,96,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 10);
      ctx.stroke();

      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 15px "Courier New", monospace';
      ctx.fillText('🧠 AI Brain', panelX + 14, panelY + 22);

      ctx.fillStyle = '#888';
      ctx.font = '10px "Courier New", monospace';
      ctx.fillText('7-Seg Path + Random Walk', panelX + 14, panelY + 36);

      // Queue rows
      for (let i = 0; i < kMaxPathLength; i++) {
        const rowY = panelY + 56 + i * 42;
        const [label, deltaStr] = getSegmentLabel(i);
        let statusIcon, statusColor;
        if (i < currentStep) {
          statusIcon = '✅';
          statusColor = '#4ade80';
        } else if (i === currentStep) {
          statusIcon = '▶';
          statusColor = '#e94560';
        } else {
          statusIcon = '⏳';
          statusColor = '#555';
        }

        if (i === currentStep) {
          ctx.fillStyle = 'rgba(233,69,96,0.12)';
          ctx.beginPath();
          ctx.roundRect(panelX + 8, rowY - 4, panelW - 16, 36, 5);
          ctx.fill();
        }

        ctx.fillStyle = statusColor;
        ctx.font = '14px "Courier New", monospace';
        ctx.fillText(statusIcon, panelX + 12, rowY + 14);

        ctx.font = '11px "Courier New", monospace';
        ctx.fillStyle = statusColor;
        ctx.fillText(label, panelX + 34, rowY + 14);

        ctx.fillStyle = i <= currentStep ? '#999' : '#444';
        ctx.font = '10px "Courier New", monospace';
        ctx.fillText(deltaStr, panelX + 34, rowY + 28);
      }

      // Bottom stats
      const statsY = panelY + panelH - 50;
      ctx.fillStyle = '#ccc';
      ctx.font = '12px "Courier New", monospace';
      ctx.fillText('Seed path phase: ' + currentStep + '/' + kMaxPathLength, panelX + 14, statsY);
      ctx.fillStyle = autoPlay ? '#4ade80' : '#ffd93d';
      ctx.fillText('Mode: ' + (autoPlay ? 'Auto' : 'Step'), panelX + 14, statsY + 16);
      ctx.fillStyle = use4Dir ? '#4ecdc4' : '#ffd93d';
      ctx.fillText('Movement: ' + (use4Dir ? '4-dir' : '8-dir') + ' (press 2)', panelX + 14, statsY + 32);

      ctx.restore();

      // HUD text
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('Cat pos X,y ' + catPosition.x + ',' + catPosition.y, 620, 30);
      ctx.fillText('Mouse pos X,y ' + mousePosition.x + ',' + mousePosition.y, 620, 50);
      ctx.fillStyle = use4Dir ? '#4ecdc4' : '#ffd93d';
      ctx.fillText('Mode: ' + (use4Dir ? '4-dir' : '8-dir') + ' (press 2)', 620, 70);
      ctx.restore();
    }

    // ─── Game Loop ───────────────────────────────────────────────────
    init();

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
