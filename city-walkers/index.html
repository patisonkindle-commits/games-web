<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Walkers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #ccc;
      overflow: hidden;
    }
    #gameCanvas {
      border: 2px solid #4ecdc4;
      border-radius: 4px;
      max-width: 100%;
      max-height: 85vh;
      touch-action: none;
    }
    .controls-bar {
      margin-top: 10px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.4);
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .controls-bar .slider-group {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #888;
    }
    .controls-bar .slider-group label {
      min-width: 28px;
      text-align: right;
      font-weight: bold;
    }
    .controls-bar .slider-group .val {
      min-width: 22px;
      font-weight: bold;
    }
    .controls-bar input[type="range"] {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .controls-bar input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #7c5bfa;
      cursor: pointer;
    }
    .controls-bar input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #7c5bfa;
      cursor: pointer;
    }
    .controls-bar .btn-group {
      display: flex;
      gap: 6px;
    }
    .controls-bar button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ccc;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      transition: all 0.15s;
    }
    .controls-bar button:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    .controls-bar button.primary {
      background: rgba(78,205,196,0.2);
      border-color: #4ecdc4;
      color: #4ecdc4;
    }
    .controls-bar button.primary:hover {
      background: rgba(78,205,196,0.35);
    }

    .coh input[type="range"] { background: rgba(78,205,196,0.3); }
    .coh input[type="range"]::-webkit-slider-thumb { background: #4ecdc4; border-color: #2ebdb4; }
    .coh .val { color: #4ecdc4; }
    .sep input[type="range"] { background: rgba(255,107,107,0.3); }
    .sep input[type="range"]::-webkit-slider-thumb { background: #ff6b6b; border-color: #ff4444; }
    .sep .val { color: #ff6b6b; }
    .ali input[type="range"] { background: rgba(255,217,61,0.3); }
    .ali input[type="range"]::-webkit-slider-thumb { background: #ffd93d; border-color: #e0c020; }
    .ali .val { color: #ffd93d; }
    .spd input[type="range"] { background: rgba(167,139,250,0.3); }
    .spd input[type="range"]::-webkit-slider-thumb { background: #a78bfa; border-color: #8b6ff0; }
    .spd .val { color: #a78bfa; }
    .pop input[type="range"] { background: rgba(244,114,182,0.3); }
    .pop input[type="range"]::-webkit-slider-thumb { background: #f472b6; border-color: #d85a9e; }
    .pop .val { color: #f472b6; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div class="controls-bar">
    <span style="font-size:12px;color:#4ecdc4;font-weight:bold;">🚶 City Walkers</span>
    <div class="slider-group coh">
      <label>COH</label>
      <input type="range" id="cohesionSlider" min="0" max="300" value="50">
      <span class="val" id="cohesionVal">0.50</span>
    </div>
    <div class="slider-group sep">
      <label>SEP</label>
      <input type="range" id="separationSlider" min="0" max="300" value="120">
      <span class="val" id="separationVal">1.20</span>
    </div>
    <div class="slider-group ali">
      <label>ALI</label>
      <input type="range" id="alignmentSlider" min="0" max="300" value="30">
      <span class="val" id="alignmentVal">0.30</span>
    </div>
    <div class="slider-group spd">
      <label>SPD</label>
      <input type="range" id="speedSlider" min="20" max="200" value="80">
      <span class="val" id="speedVal">80</span>
    </div>
    <div class="slider-group pop">
      <label>POP</label>
      <input type="range" id="populationSlider" min="5" max="120" value="40">
      <span class="val" id="populationVal">40</span>
    </div>
    <div class="btn-group">
      <button id="resetBtn" class="primary">↻ Reset</button>
      <button id="pathToggleBtn">⊟ Paths OFF</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
